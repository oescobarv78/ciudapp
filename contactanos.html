<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contáctanos - CiudApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }

    header {
      background: #111;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h2 { color: #00e5a0; font-size: 1.3rem; }
    header a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid white;
      padding: 0.4rem 1rem;
      border-radius: 20px;
    }
    header a:hover { background: white; color: #111; }

    .container {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    .info h2 { color: #1a73e8; margin-bottom: 1rem; font-size: 1.4rem; }
    .info p { color: #555; line-height: 1.7; margin-bottom: 1.5rem; }
    .item {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
      align-items: flex-start;
      color: #444;
    }
    .item span:first-child { font-size: 1.4rem; }

    .form-card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .form-card h2 { color: #333; margin-bottom: 1.5rem; font-size: 1.2rem; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.3rem; }
    input, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      font-family: inherit;
      transition: border 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #1a73e8; }
    textarea { resize: vertical; min-height: 120px; }
    button {
      width: 100%;
      padding: 0.85rem;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1557b0; }

    @media (max-width: 680px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <h2>⚡ CiudApp</h2>
    <a href="index.html">← Volver al inicio</a>
  </header>

  <div class="container">

    <div class="info">
      <h2>¿Cómo podemos ayudarte?</h2>
      <p>Estamos aquí para atenderte. Escríbenos y responderemos lo antes posible.</p>
      <div class="item"><span>📍</span><span>Av. Principal 123, Lima, Perú</span></div>
      <div class="item"><span>📞</span><span>+51 999 888 777</span></div>
      <div class="item"><span>📧</span><span>soporte@ciudapp.pe</span></div>
      <div class="item"><span>🕒</span><span>Lunes a Viernes: 8am – 6pm</span></div>
    </div>

    <div class="form-card">
      <h2>Envíanos un mensaje</h2>
      <label>Nombre completo</label>
      <input type="text" placeholder="Tu nombre"/>
      <label>Correo electrónico</label>
      <input type="email" placeholder="tucorreo@ejemplo.com"/>
      <label>Asunto</label>
      <input type="text" placeholder="¿Sobre qué nos escribes?"/>
      <label>Mensaje</label>
      <textarea placeholder="Escribe tu mensaje aquí..."></textarea>
      <button onclick="alert('✅ Mensaje enviado correctamente')">Enviar mensaje</button>
    </div>

  </div>

</body>
</html>
