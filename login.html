<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - CiudApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
    }
    h1 { text-align: center; color: #1a73e8; margin-bottom: 0.5rem; }
    p.sub { text-align: center; color: #777; margin-bottom: 2rem; font-size: 0.9rem; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.3rem; }
    input {
      width: 100%; padding: 0.75rem 1rem;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 1rem; margin-bottom: 1.2rem;
      transition: border 0.2s;
    }
    input:focus { outline: none; border-color: #1a73e8; }
    button {
      width: 100%; padding: 0.85rem;
      background: #1a73e8; color: white;
      border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1557b0; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #777; }
    .footer a { color: #1a73e8; text-decoration: none; }
    @media (max-width: 480px) { .card { margin: 1rem; padding: 2rem 1.5rem; } }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ CiudApp</h1>
    <p class="sub">Inicia sesión en tu cuenta</p>
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="tucorreo@ejemplo.com" />
    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" />
    <button onclick="window.location.href='index.html'">Ingresar</button>
    <div class="footer">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>
  </div>
</body>
</html>
